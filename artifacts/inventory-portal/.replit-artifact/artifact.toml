kind = "web"
previewPath = "/"
title = "Inventory Portal"
version = "1.0.0"
id = "artifacts/inventory-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22380

[services.development]
run = "pnpm --filter @workspace/inventory-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/inventory-portal", "run", "build" ]
publicDir = "artifacts/inventory-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22380"
BASE_PATH = "/"
