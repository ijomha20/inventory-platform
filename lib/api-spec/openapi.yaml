openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: inventory
    description: Inventory data
  - name: access
    description: Access list management
  - name: audit
    description: Audit log
  - name: lender
    description: Lender deal calculator
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inventory:
    get:
      operationId: getInventory
      tags: [inventory]
      summary: Get all inventory items
      responses:
        "200":
          description: List of inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cache-status:
    get:
      operationId: getCacheStatus
      tags: [inventory]
      summary: Get the timestamp of the last inventory cache refresh
      responses:
        "200":
          description: Cache status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vehicle-images:
    get:
      operationId: getVehicleImages
      tags: [inventory]
      summary: Get photo gallery URLs for a vehicle by VIN
      parameters:
        - name: vin
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vehicle image URLs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleImages"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /access:
    get:
      operationId: getAccessList
      tags: [access]
      summary: Get list of approved emails (owner only)
      responses:
        "200":
          description: Approved emails
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessEntry"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addAccessEntry
      tags: [access]
      summary: Add an email to the access list (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddAccessRequest"
      responses:
        "200":
          description: Entry added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessEntry"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /access/{email}:
    patch:
      operationId: updateAccessRole
      tags: [access]
      summary: Update a user's role (owner only)
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccessRoleRequest"
      responses:
        "200":
          description: Entry updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessEntry"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: removeAccessEntry
      tags: [access]
      summary: Remove an email from the access list (owner only)
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entry removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lender-programs:
    get:
      operationId: getLenderPrograms
      tags: [lender]
      summary: Get cached lender program matrices (owner only)
      responses:
        "200":
          description: Lender programs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LenderProgramsResponse"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lender-status:
    get:
      operationId: getLenderStatus
      tags: [lender]
      summary: Get lender sync status (owner only)
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LenderStatus"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /refresh-lender:
    post:
      operationId: refreshLender
      tags: [lender]
      summary: Trigger manual lender sync (owner only)
      responses:
        "200":
          description: Sync triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lender-calculate:
    post:
      operationId: lenderCalculate
      tags: [lender]
      summary: Calculate inventory affordability by lender/tier (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LenderCalculateRequest"
      responses:
        "200":
          description: Filtered results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LenderCalculateResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /audit-log:
    get:
      operationId: getAuditLog
      tags: [audit]
      summary: Get audit log of access changes (owner only)
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        picture:
          type: string
        isOwner:
          type: boolean
        role:
          type: string
      required:
        - email
        - name
        - isOwner
        - role

    InventoryItem:
      type: object
      properties:
        location:
          type: string
        vehicle:
          type: string
        vin:
          type: string
        price:
          type: string
        km:
          type: string
        carfax:
          type: string
        website:
          type: string
        onlinePrice:
          type: string
        matrixPrice:
          type: string
          nullable: true
        cost:
          type: string
          nullable: true
        bbAvgWholesale:
          type: string
          nullable: true
      required:
        - location
        - vehicle
        - vin
        - price

    CacheStatus:
      type: object
      properties:
        lastUpdated:
          type: string
          nullable: true
        isRefreshing:
          type: boolean
        count:
          type: integer
      required:
        - isRefreshing
        - count

    VehicleImages:
      type: object
      properties:
        vin:
          type: string
        urls:
          type: array
          items:
            type: string
      required:
        - vin
        - urls

    AccessEntry:
      type: object
      properties:
        email:
          type: string
        addedAt:
          type: string
        addedBy:
          type: string
        role:
          type: string
      required:
        - email
        - addedAt
        - addedBy
        - role

    AddAccessRequest:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
      required:
        - email

    UpdateAccessRoleRequest:
      type: object
      properties:
        role:
          type: string
      required:
        - role

    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        targetEmail:
          type: string
        changedBy:
          type: string
        roleFrom:
          type: string
          nullable: true
        roleTo:
          type: string
          nullable: true
        timestamp:
          type: string
      required:
        - id
        - action
        - targetEmail
        - changedBy
        - timestamp

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    LenderProgramTier:
      type: object
      properties:
        tierName:
          type: string
        minRate:
          type: number
        maxRate:
          type: number
        maxPayment:
          type: number
        maxAdvanceLTV:
          type: number
        maxAftermarketLTV:
          type: number
        maxAllInLTV:
          type: number
        creditorFee:
          type: number
        dealerReserve:
          type: number
      required:
        - tierName
        - minRate
        - maxRate
        - maxPayment
        - maxAdvanceLTV
        - maxAftermarketLTV
        - maxAllInLTV
        - creditorFee
        - dealerReserve

    VehicleTermMatrixData:
      type: object
      properties:
        term:
          type: integer
        kmFrom:
          type: integer
        kmTo:
          type: integer
      required: [term, kmFrom, kmTo]

    VehicleTermMatrixEntry:
      type: object
      properties:
        year:
          type: integer
        data:
          type: array
          items:
            $ref: "#/components/schemas/VehicleTermMatrixData"
      required: [year, data]

    KmRange:
      type: object
      properties:
        kmFrom:
          type: integer
        kmTo:
          type: integer
      required: [kmFrom, kmTo]

    VehicleConditionMatrixEntry:
      type: object
      properties:
        year:
          type: integer
        extraClean:
          $ref: "#/components/schemas/KmRange"
        clean:
          $ref: "#/components/schemas/KmRange"
        average:
          $ref: "#/components/schemas/KmRange"
        rough:
          $ref: "#/components/schemas/KmRange"
      required: [year, extraClean, clean, average, rough]

    LenderProgramGuide:
      type: object
      properties:
        programId:
          type: string
        programTitle:
          type: string
        programType:
          type: string
        tiers:
          type: array
          items:
            $ref: "#/components/schemas/LenderProgramTier"
        vehicleTermMatrix:
          type: array
          items:
            $ref: "#/components/schemas/VehicleTermMatrixEntry"
        vehicleConditionMatrix:
          type: array
          items:
            $ref: "#/components/schemas/VehicleConditionMatrixEntry"
        maxTerm:
          type: integer
      required:
        - programId
        - programTitle
        - programType
        - tiers
        - vehicleTermMatrix
        - vehicleConditionMatrix

    LenderProgram:
      type: object
      properties:
        lenderCode:
          type: string
        lenderName:
          type: string
        creditorId:
          type: string
        programs:
          type: array
          items:
            $ref: "#/components/schemas/LenderProgramGuide"
      required:
        - lenderCode
        - lenderName
        - creditorId
        - programs

    LenderProgramsResponse:
      type: object
      properties:
        programs:
          type: array
          items:
            $ref: "#/components/schemas/LenderProgram"
        updatedAt:
          type: string
          nullable: true
      required:
        - programs

    LenderStatus:
      type: object
      properties:
        running:
          type: boolean
        startedAt:
          type: string
          nullable: true
        lastRun:
          type: string
          nullable: true
        lenderCount:
          type: integer
        error:
          type: string
          nullable: true
        programsAge:
          type: string
          nullable: true
      required:
        - running
        - lenderCount

    LenderCalculateRequest:
      type: object
      properties:
        lenderCode:
          type: string
        programId:
          type: string
        tierName:
          type: string
        approvedRate:
          type: number
        approvedTerm:
          type: number
        maxPaymentOverride:
          type: number
        downPayment:
          type: number
        tradeValue:
          type: number
        tradeLien:
          type: number
        taxRate:
          type: number
      required:
        - lenderCode
        - programId
        - tierName
        - approvedRate
        - approvedTerm

    LenderCalcResultItem:
      type: object
      properties:
        vin:
          type: string
        vehicle:
          type: string
        location:
          type: string
        bbWholesale:
          type: number
        totalFinanced:
          type: number
        monthlyPayment:
          type: number
        costOfBorrowing:
          type: number
        hasPhotos:
          type: boolean
        website:
          type: string
      required:
        - vin
        - vehicle
        - location
        - bbWholesale
        - totalFinanced
        - monthlyPayment
        - costOfBorrowing

    LenderCalculateResponse:
      type: object
      properties:
        lender:
          type: string
        program:
          type: string
        tier:
          type: string
        tierConfig:
          $ref: "#/components/schemas/LenderProgramTier"
        resultCount:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/LenderCalcResultItem"
      required:
        - lender
        - program
        - tier
        - tierConfig
        - resultCount
        - results
