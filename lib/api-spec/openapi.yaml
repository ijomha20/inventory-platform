openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: inventory
    description: Inventory data
  - name: access
    description: Access list management
  - name: audit
    description: Audit log
  - name: lender
    description: Inventory Selector (lender program calculator)
  - name: carfax
    description: Carfax VHR management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/google:
    get:
      operationId: authGoogle
      tags: [auth]
      summary: Kick off Google OAuth login flow (redirects to Google)
      responses:
        "302":
          description: Redirects to Google OAuth consent screen

  /auth/google/callback:
    get:
      operationId: authGoogleCallback
      tags: [auth]
      summary: Google OAuth callback (redirects to app)
      parameters:
        - name: code
          in: query
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        "302":
          description: Redirects to app root on success or /?auth_error=1 on failure

  /auth/logout:
    get:
      operationId: authLogout
      tags: [auth]
      summary: Destroy session and redirect to app root
      responses:
        "302":
          description: Redirects to /

  /auth/debug-callback:
    get:
      operationId: authDebugCallback
      tags: [auth]
      summary: Debug endpoint showing the computed OAuth callback URL
      responses:
        "200":
          description: Callback URL info
          content:
            application/json:
              schema:
                type: object
                properties:
                  callbackURL:
                    type: string
                  REPLIT_DOMAINS:
                    type: string
                required:
                  - callbackURL
                  - REPLIT_DOMAINS

  /me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inventory:
    get:
      operationId: getInventory
      tags: [inventory]
      summary: Get all inventory items
      responses:
        "200":
          description: List of inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Access denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cache-status:
    get:
      operationId: getCacheStatus
      tags: [inventory]
      summary: Get the timestamp of the last inventory cache refresh
      responses:
        "200":
          description: Cache status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CacheStatus"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /refresh:
    post:
      operationId: refreshCache
      tags: [inventory]
      summary: Webhook from Apps Script to trigger an immediate cache refresh (secret header auth)
      parameters:
        - name: x-refresh-secret
          in: header
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refresh triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessageResponse"
        "401":
          description: Unauthorized — invalid or missing secret
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /refresh-blackbook:
    post:
      operationId: refreshBlackBook
      tags: [inventory]
      summary: Trigger manual Black Book refresh (owner only)
      responses:
        "200":
          description: Refresh started or already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessageResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /vehicle-images:
    get:
      operationId: getVehicleImages
      tags: [inventory]
      summary: Get photo gallery URLs for a vehicle by VIN
      parameters:
        - name: vin
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Vehicle image URLs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehicleImages"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /access:
    get:
      operationId: getAccessList
      tags: [access]
      summary: Get list of approved emails (owner only)
      responses:
        "200":
          description: Approved emails
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessEntry"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: addAccessEntry
      tags: [access]
      summary: Add an email to the access list (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddAccessRequest"
      responses:
        "200":
          description: Entry added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessEntry"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /access/{email}:
    patch:
      operationId: updateAccessRole
      tags: [access]
      summary: Update a user's role (owner only)
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccessRoleRequest"
      responses:
        "200":
          description: Entry updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessEntry"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: removeAccessEntry
      tags: [access]
      summary: Remove an email from the access list (owner only)
      parameters:
        - name: email
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Entry removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lender-programs:
    get:
      operationId: getLenderPrograms
      tags: [lender]
      summary: Get cached lender program matrices (owner or viewer)
      responses:
        "200":
          description: Lender programs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LenderProgramsResponse"
        "403":
          description: Owner or Viewer only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lender-status:
    get:
      operationId: getLenderStatus
      tags: [lender]
      summary: Get lender sync status (owner or viewer)
      responses:
        "200":
          description: Sync status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LenderStatus"
        "403":
          description: Owner or Viewer only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /refresh-lender:
    post:
      operationId: refreshLender
      tags: [lender]
      summary: Trigger manual lender sync (owner only)
      responses:
        "200":
          description: Sync triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lender-calculate:
    post:
      operationId: lenderCalculate
      tags: [lender]
      summary: Calculate inventory affordability by lender/tier (owner or viewer)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LenderCalculateRequest"
      responses:
        "200":
          description: Filtered results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LenderCalculateResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Owner or Viewer only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lender, program, or tier not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /lender-debug:
    get:
      operationId: getLenderDebug
      tags: [lender]
      summary: Diagnostic dump of cached lender program metadata (owner only)
      responses:
        "200":
          description: Debug lender summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  updatedAt:
                    type: string
                    nullable: true
                  lenders:
                    type: array
                    items:
                      type: object
                  calculatorVersion:
                    type: string
                  gitSha:
                    type: string
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /audit-log:
    get:
      operationId: getAuditLog
      tags: [audit]
      summary: Get audit log of access changes (owner only)
      responses:
        "200":
          description: Audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogEntry"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /carfax/batch-status:
    get:
      operationId: getCarfaxBatchStatus
      tags: [carfax]
      summary: Get current Carfax batch worker status (owner only)
      responses:
        "200":
          description: Batch status
          content:
            application/json:
              schema:
                type: object
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /carfax/run-batch:
    post:
      operationId: runCarfaxBatch
      tags: [carfax]
      summary: Trigger a manual Carfax batch run (owner only)
      responses:
        "200":
          description: Batch started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessageResponse"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Batch already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /carfax/test:
    post:
      operationId: runCarfaxTest
      tags: [carfax]
      summary: Run a targeted Carfax lookup for up to 10 VINs (owner only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                vins:
                  type: array
                  items:
                    type: string
              required:
                - vins
      responses:
        "200":
          description: Test results
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  results:
                    type: object
                required:
                  - ok
                  - results
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Owner only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /price-lookup:
    get:
      operationId: priceLookup
      tags: [inventory]
      summary: Resolve a dealer listing URL to a live price via Typesense
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resolved price (null if not found)
          content:
            application/json:
              schema:
                type: object
                properties:
                  price:
                    type: string
                    nullable: true
                required:
                  - price
        "400":
          description: Invalid URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    User:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
        picture:
          type: string
        isOwner:
          type: boolean
        role:
          type: string
      required:
        - email
        - name
        - isOwner
        - role

    InventoryItem:
      type: object
      properties:
        location:
          type: string
        vehicle:
          type: string
        vin:
          type: string
        price:
          type: string
        km:
          type: string
        carfax:
          type: string
        website:
          type: string
        onlinePrice:
          type: string
        matrixPrice:
          type: string
          nullable: true
        cost:
          type: string
          nullable: true
        bbAvgWholesale:
          type: string
          nullable: true
        hasPhotos:
          type: boolean
        bbValues:
          type: object
          nullable: true
          properties:
            xclean:
              type: number
            clean:
              type: number
            avg:
              type: number
            rough:
              type: number
          required:
            - xclean
            - clean
            - avg
            - rough
      required:
        - location
        - vehicle
        - vin
        - price

    CacheStatus:
      type: object
      properties:
        lastUpdated:
          type: string
          nullable: true
        isRefreshing:
          type: boolean
        count:
          type: integer
        bbRunning:
          type: boolean
        bbLastRun:
          type: string
          nullable: true
        bbCount:
          type: integer
          nullable: true
      required:
        - isRefreshing
        - count
        - bbRunning

    VehicleImages:
      type: object
      properties:
        vin:
          type: string
        urls:
          type: array
          items:
            type: string
        websiteUrl:
          type: string
          nullable: true
      required:
        - vin
        - urls

    AccessEntry:
      type: object
      properties:
        email:
          type: string
        addedAt:
          type: string
        addedBy:
          type: string
        role:
          type: string
      required:
        - email
        - addedAt
        - addedBy
        - role

    AddAccessRequest:
      type: object
      properties:
        email:
          type: string
        role:
          type: string
      required:
        - email

    UpdateAccessRoleRequest:
      type: object
      properties:
        role:
          type: string
      required:
        - role

    AuditLogEntry:
      type: object
      properties:
        id:
          type: integer
        action:
          type: string
        targetEmail:
          type: string
        changedBy:
          type: string
        roleFrom:
          type: string
          nullable: true
        roleTo:
          type: string
          nullable: true
        timestamp:
          type: string
      required:
        - id
        - action
        - targetEmail
        - changedBy
        - timestamp

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    SuccessMessageResponse:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: string
      required:
        - ok

    LenderProgramTier:
      type: object
      properties:
        tierName:
          type: string
        minRate:
          type: number
        maxRate:
          type: number
        maxPayment:
          type: number
        maxAdvanceLTV:
          type: number
        maxAftermarketLTV:
          type: number
        maxAllInLTV:
          type: number
        creditorFee:
          type: number
        dealerReserve:
          type: number
      required:
        - tierName
        - minRate
        - maxRate
        - maxPayment
        - maxAdvanceLTV
        - maxAftermarketLTV
        - maxAllInLTV
        - creditorFee
        - dealerReserve

    VehicleTermMatrixData:
      type: object
      properties:
        term:
          type: integer
        kmFrom:
          type: integer
        kmTo:
          type: integer
      required: [term, kmFrom, kmTo]

    VehicleTermMatrixEntry:
      type: object
      properties:
        year:
          type: integer
        data:
          type: array
          items:
            $ref: "#/components/schemas/VehicleTermMatrixData"
      required: [year, data]

    KmRange:
      type: object
      properties:
        kmFrom:
          type: integer
        kmTo:
          type: integer
      required: [kmFrom, kmTo]

    VehicleConditionMatrixEntry:
      type: object
      properties:
        year:
          type: integer
        extraClean:
          $ref: "#/components/schemas/KmRange"
        clean:
          $ref: "#/components/schemas/KmRange"
        average:
          $ref: "#/components/schemas/KmRange"
        rough:
          $ref: "#/components/schemas/KmRange"
      required: [year, extraClean, clean, average, rough]

    LenderProgramGuide:
      type: object
      properties:
        programId:
          type: string
        programTitle:
          type: string
        programType:
          type: string
        tiers:
          type: array
          items:
            $ref: "#/components/schemas/LenderProgramTier"
        vehicleTermMatrix:
          type: array
          items:
            $ref: "#/components/schemas/VehicleTermMatrixEntry"
        vehicleConditionMatrix:
          type: array
          items:
            $ref: "#/components/schemas/VehicleConditionMatrixEntry"
        maxTerm:
          type: integer
        maxWarrantyPrice:
          type: number
          nullable: true
        maxGapPrice:
          type: number
          nullable: true
        maxAdminFee:
          type: number
          nullable: true
      required:
        - programId
        - programTitle
        - programType
        - tiers
        - vehicleTermMatrix
        - vehicleConditionMatrix

    LenderProgram:
      type: object
      properties:
        lenderCode:
          type: string
        lenderName:
          type: string
        creditorId:
          type: string
        programs:
          type: array
          items:
            $ref: "#/components/schemas/LenderProgramGuide"
      required:
        - lenderCode
        - lenderName
        - creditorId
        - programs

    LenderProgramsResponse:
      type: object
      properties:
        programs:
          type: array
          items:
            $ref: "#/components/schemas/LenderProgram"
        updatedAt:
          type: string
          nullable: true
        role:
          type: string
      required:
        - programs

    LenderStatus:
      type: object
      properties:
        running:
          type: boolean
        startedAt:
          type: string
          nullable: true
        lastRun:
          type: string
          nullable: true
        lenderCount:
          type: integer
        error:
          type: string
          nullable: true
        programsAge:
          type: string
          nullable: true
      required:
        - running
        - lenderCount

    LenderCalculateRequest:
      type: object
      properties:
        lenderCode:
          type: string
        programId:
          type: string
        tierName:
          type: string
        approvedRate:
          type: number
        maxPaymentOverride:
          type: number
        downPayment:
          type: number
        tradeValue:
          type: number
        tradeLien:
          type: number
        taxRate:
          type: number
        adminFee:
          type: number
        termStretchMonths:
          type: integer
      required:
        - lenderCode
        - programId
        - tierName
        - approvedRate

    LenderCalcResultItem:
      type: object
      properties:
        vin:
          type: string
        vehicle:
          type: string
        location:
          type: string
        term:
          type: integer
        matrixTerm:
          type: integer
        termStretchApplied:
          type: integer
        termStretched:
          type: boolean
        termStretchCappedReason:
          type: string
          nullable: true
        conditionUsed:
          type: string
        bbWholesale:
          type: number
        pacCost:
          type: number
        pacCostSource:
          type: string
        onlinePrice:
          type: number
          nullable: true
        sellingPrice:
          type: number
        sellingPriceCappedByOnline:
          type: boolean
        bindingSellingConstraint:
          type: string
        requiredDownPayment:
          type: number
        adminFeeUsed:
          type: number
        warrantyPrice:
          type: number
        warrantyCost:
          type: number
        gapPrice:
          type: number
        gapCost:
          type: number
        totalFinanced:
          type: number
        monthlyPayment:
          type: number
        frontEndGross:
          type: number
        nonCancelableGross:
          type: number
        cancelableBackendGross:
          type: number
        totalGross:
          type: number
        allocationOrderApplied:
          type: array
          items:
            type: string
        hasPhotos:
          type: boolean
        website:
          type: string
      required:
        - vin
        - vehicle
        - location
        - term
        - matrixTerm
        - termStretchApplied
        - termStretched
        - conditionUsed
        - bbWholesale
        - pacCost
        - pacCostSource
        - sellingPrice
        - sellingPriceCappedByOnline
        - bindingSellingConstraint
        - adminFeeUsed
        - warrantyPrice
        - warrantyCost
        - gapPrice
        - gapCost
        - totalFinanced
        - monthlyPayment
        - frontEndGross
        - nonCancelableGross
        - cancelableBackendGross
        - totalGross
        - allocationOrderApplied
        - hasPhotos
        - website

    DebugCounts:
      type: object
      properties:
        total:
          type: integer
        noYear:
          type: integer
        noKm:
          type: integer
        noTerm:
          type: integer
        noCondition:
          type: integer
        noBB:
          type: integer
        noBBVal:
          type: integer
        noPacPrice:
          type: integer
        passed:
          type: integer

    ProgramLimits:
      type: object
      properties:
        maxWarrantyPrice:
          type: number
          nullable: true
        maxGapPrice:
          type: number
          nullable: true
        maxAdminFee:
          type: number
          nullable: true
        maxGapMarkup:
          type: number
        gapAllowed:
          type: boolean
        allInOnly:
          type: boolean
        hasAdvanceCap:
          type: boolean
        hasAftermarketCap:
          type: boolean
        aftermarketBudgetIsDynamic:
          type: boolean
        aftermarketBase:
          type: string
        adminFeeInclusion:
          type: string
        capModelResolved:
          type: string
        capProfileKey:
          type: string
        noOnlineStrategy:
          type: string
      required:
        - gapAllowed
        - allInOnly
        - hasAdvanceCap
        - hasAftermarketCap
        - aftermarketBudgetIsDynamic
        - aftermarketBase
        - adminFeeInclusion
        - capModelResolved
        - capProfileKey
        - noOnlineStrategy

    LenderCalculateResponse:
      type: object
      properties:
        lender:
          type: string
        program:
          type: string
        tier:
          type: string
        termStretchMonths:
          type: integer
        calculatorVersion:
          type: string
        gitSha:
          type: string
        tierConfig:
          $ref: "#/components/schemas/LenderProgramTier"
        programLimits:
          $ref: "#/components/schemas/ProgramLimits"
        pacCostSource:
          type: string
        debugCounts:
          $ref: "#/components/schemas/DebugCounts"
        resultCount:
          type: integer
        results:
          type: array
          items:
            $ref: "#/components/schemas/LenderCalcResultItem"
      required:
        - lender
        - program
        - tier
        - termStretchMonths
        - calculatorVersion
        - gitSha
        - tierConfig
        - pacCostSource
        - programLimits
        - debugCounts
        - resultCount
        - results
